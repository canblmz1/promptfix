<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 8px;
      border-bottom: 1px solid #21262d;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #4ade80;
      flex: 1;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #484f58;
    }
    .status-dot.ok { background: #3fb950; }
    .status-dot.err { background: #f85149; }
    .status-text {
      font-size: 11px;
      color: #8b949e;
    }

    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #21262d;
    }
    .section-title {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .mode-btn {
      padding: 6px 0;
      text-align: center;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: #4ade80; color: #4ade80; }
    .mode-btn.active {
      background: #1a3a2a;
      border-color: #4ade80;
      color: #4ade80;
    }

    .history-header {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 2px;
    }
    .history-output {
      font-size: 12px;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .history-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .score-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      line-height: 1.4;
      white-space: nowrap;
    }
    .copy-btn {
      font-size: 10px;
      padding: 1px 6px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.1s;
    }
    .copy-btn:hover { color: #c9d1d9; border-color: #8b949e; }
    .copy-btn:disabled { opacity: 0.5; cursor: default; }
    .offline-banner {
      margin: 0;
      padding: 8px 14px;
      background: #2d1a1a;
      border-bottom: 1px solid #f8514930;
      color: #f85149;
      font-size: 11px;
    }
    .offline-banner code {
      background: #3d1a1a;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
    }
    .history-item {
      padding: 6px 0;
      border-bottom: 1px solid #161b22;
    }
    .history-item:last-child { border-bottom: none; }
    .history-input {
      font-size: 11px;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      font-size: 10px;
      color: #484f58;
      margin-top: 2px;
    }
    .diff-toggle {
      font-size: 10px;
      padding: 1px 6px;
      background: #161b22;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.1s;
    }
    .diff-toggle:hover { color: #c9d1d9; border-color: #8b949e; }
    .diff-view {
      margin-top: 4px;
      font-family: monospace;
      font-size: 10px;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 4px 6px;
      background: #010409;
    }
    .diff-line-add  { color: #3fb950; }
    .diff-line-del  { color: #f85149; }
    .diff-line-hdr  { color: #484f58; }
    .diff-line-ctx  { color: #8b949e; }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
    }
    .info-label { color: #8b949e; }
    .info-value { color: #c9d1d9; font-weight: 500; }

    .footer {
      padding: 8px 14px;
      text-align: center;
    }
    .footer a {
      color: #484f58;
      text-decoration: none;
      font-size: 11px;
    }
    .footer a:hover { color: #8b949e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PromptFix</h1>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <div id="offlineBanner" class="offline-banner" style="display:none;">
    Service offline &mdash; run: <code>promptfix service</code>
  </div>

  <div class="section">
    <div class="section-title">Service</div>
    <div class="info-row">
      <span class="info-label">Provider</span>
      <span class="info-value" id="provider">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Model</span>
      <span class="info-value" id="model">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="info-value" id="serviceStatus">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Uptime</span>
      <span class="info-value" id="uptime">—</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Quick Optimize</div>
    <textarea id="quickInput" placeholder="Type a rough prompt here…" rows="3" style="width:100%;padding:8px;background:#010409;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;font-size:12px;resize:vertical;margin-bottom:8px;"></textarea>
    <button id="quickOptimize" style="width:100%;padding:8px;background:#4ade80;color:#000;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;">Optimize Prompt</button>
    <div id="quickResult" style="margin-top:8px;font-size:12px;color:#c9d1d9;display:none;"></div>
  </div>

  <div class="section">
    <div class="section-title">Default Mode</div>
    <div class="mode-grid">
      <div class="mode-btn" data-mode="fast">Fast</div>
      <div class="mode-btn" data-mode="short">Short</div>
      <div class="mode-btn" data-mode="raw">Raw</div>
      <div class="mode-btn" data-mode="agent">Agent</div>
      <div class="mode-btn" data-mode="explain">Explain</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent</div>
    <div id="history">
      <div class="empty">No history yet</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Actions</div>
    <div style="display:flex;gap:8px;">
      <button onclick="openChat()" style="flex:1;padding:8px;background:#4ade80;color:#000;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;">Open Chat</button>
      <button onclick="openOptions()" style="flex:1;padding:8px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;cursor:pointer;font-size:12px;">Settings</button>
    </div>
  </div>

  <div class="footer">
    <a href="chat.html" target="_blank" id="chatLink">Open Chat in Tab</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
